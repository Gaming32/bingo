name: Gradle build
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache Gradle stuff
        uses: actions/cache@v4
        with:
          key: gradle-${{ hashFiles('*.gradle.kts', 'gradle.properties', '*/*.gradle.kts', 'gradle/**') }}
          restore-keys: gradle-
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/unimined
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu
      - name: Build with Gradle
        run: ./gradlew build --stacktrace --warning-mode=fail --no-daemon
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: build/libs
      - name: Run datagen
        run: ./gradlew runDatagen
      - name: Verify datagen up-to-date
        run: git diff --color=always --exit-code

  client_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu
      - name: Run client tests
        run: ./gradlew runClientGametest --stacktrace --warning-mode=fail --no-daemon
